name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy src/backend --ignore-missing-imports || true

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pytest tests/ --cov=src/backend --cov-report=xml || true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: |
          pip install bandit safety
          bandit -r src/backend -ll
          safety check --file requirements.txt || true

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t swingai-backend:latest .
